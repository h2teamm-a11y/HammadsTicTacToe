<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic-Tac-Toe: Championship Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0f;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%),
                              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
            padding: 20px 0;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 2;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            letter-spacing: 4px;
            text-shadow: 0 0 5px #fff, 0 0 10px #0ff, 0 0 20px #0ff;
            animation: titlePulse 2s infinite alternate;
        }

        /* Mode Selector Tabs */
        .mode-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #555e78;
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            color: #00ffff;
            background: rgba(0, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            text-shadow: 0 0 5px #00ffff;
        }

        /* Difficulty Selector System */
        .difficulty-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }

        .difficulty-container.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            margin-bottom: 5px;
            height: 0;
            overflow: hidden;
        }

        .diff-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #8892b0;
            padding: 8px 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .diff-btn[data-diff="easy"].active {
            color: #00ff66;
            border-color: #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4), inset 0 0 5px rgba(0, 255, 102, 0.2);
            text-shadow: 0 0 5px #00ff66;
        }

        .diff-btn[data-diff="normal"].active {
            color: #ffaa00;
            border-color: #ffaa00;
            box-shadow: 0 0 15px rgba(255, 170, 0, 0.4), inset 0 0 5px rgba(255, 170, 0, 0.2);
            text-shadow: 0 0 5px #ffaa00;
        }

        .diff-btn[data-diff="hard"].active {
            color: #ff2244;
            border-color: #ff2244;
            box-shadow: 0 0 15px rgba(255, 34, 68, 0.4), inset 0 0 5px rgba(255, 34, 68, 0.2);
            text-shadow: 0 0 5px #ff2244;
        }

        #status {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            min-height: 34px;
        }

        .status-player { color: #00aaff; text-shadow: 0 0 10px #00aaff; }
        .status-bot { color: #ff2244; text-shadow: 0 0 10px #ff2244; }
        .status-draw { color: #ffff55; text-shadow: 0 0 10px #ffff55; }

        #timer {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        .timer-active { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        .timer-warning { 
            color: #ff2244; 
            text-shadow: 0 0 10px #ff2244, 0 0 20px #ff2244; 
            animation: blink 0.4s infinite alternate; 
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(150, 0, 255, 0.15);
            border: 1px solid rgba(150, 0, 255, 0.25);
        }

        .cell {
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .cell:hover:not(.occupied) {
            border-color: #00aaff;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.5), inset 0 0 8px rgba(0, 170, 255, 0.3);
            background: rgba(0, 170, 255, 0.03);
        }

        .cell.occupied { cursor: not-allowed; }

        .symbol-O {
            color: #00aaff;
            text-shadow: 0 0 10px #00aaff, 0 0 20px #00aaff;
            animation: scaleIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .symbol-X {
            color: #ff2244;
            text-shadow: 0 0 10px #ff2244, 0 0 20px #ff2244;
            animation: scaleIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        .cell.winning-cell { animation: winPulse 0.5s infinite alternate; }

        #resetBtn {
            margin-top: 35px;
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #resetBtn:hover {
            color: #00aaff;
            border-color: #00aaff;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.5);
            text-shadow: 0 0 5px #00aaff;
        }

        @keyframes titlePulse {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #0ff, 0 0 15px #0ff; }
            to { text-shadow: 0 0 10px #fff, 0 0 15px #0ff, 0 0 30px #0ff; }
        }

        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes winPulse {
            0% { background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 10px currentColor; }
            100% { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 25px currentColor; transform: scale(1.02); }
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>TIC-TAC-TOE</h1>

        <!-- Mode Architecture Configuration Elements -->
        <div class="mode-container">
            <button class="mode-btn active" data-mode="bot">VS BOT</button>
            <button class="mode-btn" data-mode="local">LOCAL 2P</button>
        </div>

        <div class="difficulty-container" id="diff-box">
            <button class="diff-btn" data-diff="easy">EASY</button>
            <button class="diff-btn" data-diff="normal" class="active">NORMAL</button>
            <button class="diff-btn" data-diff="hard">HARD</button>
        </div>

        <div id="status" class="status-player">Your Turn (O)</div>
        <div id="timer" class="timer-active">TIME LEFT: <span id="time-val">15</span>s</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <button id="resetBtn">RESET GAME</button>
    </div>

    <script>
        let board = Array(9).fill(null);
        let gameActive = true;
        let isBotThinking = false;
        let currentGameMode = 'bot'; // 'bot' or 'local'
        let currentDifficulty = 'normal';
        let localTurn = 'O'; // Tracks active user during local screen share matches
        
        let timerInterval = null;
        let timeLeft = 15;
        const TURN_LIMITS = { easy: 30, normal: 15, hard: 10, local: 15 };

        const HUMAN = 'O'; // Blue
        const BOT = 'X';   // Red

        const WIN_CONDITIONS = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('status');
        const timerDisplay = document.getElementById('time-val');
        const timerContainer = document.getElementById('timer');
        const resetBtn = document.getElementById('resetBtn');
        const diffButtons = document.querySelectorAll('.diff-btn');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const diffBox = document.getElementById('diff-box');

        // Mode Switching Event Engine Loop
        modeButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (isBotThinking) return;
                modeButtons.forEach(b => b.classList.remove('active'));
                currentGameMode = e.target.getAttribute('data-mode');
                e.target.classList.add('active');
                
                if (currentGameMode === 'local') {
                    diffBox.classList.add('hidden');
                } else {
                    diffBox.classList.remove('hidden');
                }
                resetGame();
            });
        });

        // Difficulty Selector Setup Logic Route
        diffButtons.forEach(btn => {
            if(btn.getAttribute('data-diff') === currentDifficulty) btn.classList.add('active');
            btn.addEventListener('click', (e) => {
                if (isBotThinking) return;
                diffButtons.forEach(b => b.classList.remove('active'));
                currentDifficulty = e.target.getAttribute('data-diff');
                e.target.classList.add('active');
                resetGame();
            });
        });

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', resetGame);

        startTimer();

        function handleCellClick(e) {
            const index = parseInt(e.target.getAttribute('data-index'));
            if (board[index] !== null || !gameActive || isBotThinking) return;

            stopTimer();

            if (currentGameMode === 'bot') {
                /* VS BOT MODE PIPELINE */
                makeMove(index, HUMAN);
                const result = checkGameState(board);
                
                if (result) {
                    processEndGame(result);
                } else {
                    isBotThinking = true;
                    statusDisplay.textContent = "Bot Thinking...";
                    statusDisplay.className = "status-bot";
                    timerContainer.style.opacity = "0.3";
                    
                    // Humanized Processing Latency Calculation Engine Block
                    const humanizedDelay = Math.floor(Math.random() * 1100) + 500; // Variable 500ms - 1600ms Delay
                    
                    setTimeout(() => {
                        const botMoveIndex = selectBotMove();
                        makeMove(botMoveIndex, BOT);
                        
                        const botResult = checkGameState(board);
                        if (botResult) {
                            processEndGame(botResult);
                        } else {
                            statusDisplay.textContent = "Your Turn (O)";
                            statusDisplay.className = "status-player";
                            timerContainer.style.opacity = "1";
                            isBotThinking = false;
                            startTimer();
                        }
                    }, humanizedDelay);
                }
            } else {
                /* LOCAL 2-PLAYER MODE PIPELINE */
                makeMove(index, localTurn);
                const result = checkGameState(board);
                
                if (result) {
                    processEndGame(result);
                } else {
                    // Invert active user coordinates context variables safely
                    localTurn = (localTurn === HUMAN) ? BOT : HUMAN;
                    updateLocalStatusUI();
                    startTimer();
                }
            }
        }

        function updateLocalStatusUI() {
            if (localTurn === HUMAN) {
                statusDisplay.textContent = "Blue's Turn (O)";
                statusDisplay.className = "status-player";
            } else {
                statusDisplay.textContent = "Red's Turn (X)";
                statusDisplay.className = "status-bot";
            }
        }

        /* =========================================================================
           TIMER AND TIMEOUT DISPATCH RULES
           =========================================================================
        */
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = (currentGameMode === 'bot') ? TURN_LIMITS[currentDifficulty] : TURN_LIMITS['local'];
            updateTimerUI();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeoutLoss();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateTimerUI() {
            timerDisplay.textContent = timeLeft;
            timerContainer.className = (timeLeft <= 3) ? 'timer-warning' : 'timer-active';
        }

        function handleTimeoutLoss() {
            gameActive = false;
            isBotThinking = false;
            
            if (currentGameMode === 'bot') {
                statusDisplay.textContent = "💀 TIME'S UP! U LOSE";
                statusDisplay.className = "status-bot";
            } else {
                // In local 2P matches, whoever let the clock expire defaults the win
                if (localTurn === HUMAN) {
                    statusDisplay.textContent = "💀 BLUE TIMEOUT! RED WINS";
                    statusDisplay.className = "status-bot";
                } else {
                    statusDisplay.textContent = "💀 RED TIMEOUT! BLUE WINS";
                    statusDisplay.className = "status-player";
                }
            }
            
            cells.forEach(cell => {
                if(!cell.classList.contains('occupied')) cell.classList.add('occupied');
            });
        }

        function makeMove(index, player) {
            board[index] = player;
            const cell = cells[index];
            cell.classList.add('occupied');
            
            const span = document.createElement('span');
            span.textContent = player;
            span.classList.add(player === HUMAN ? 'symbol-O' : 'symbol-X');
            cell.appendChild(span);
        }

        /* =========================================================================
           BOT RUNTIME SELECTION ALGORITHMS (MINIMAX CORE)
           =========================================================================
        */
        function selectBotMove() {
            const emptyIndexes = board.map((v, i) => v === null ? i : null).filter(v => v !== null);

            if (currentDifficulty === 'easy') {
                return emptyIndexes[Math.floor(Math.random() * emptyIndexes.length)];
            } 
            else if (currentDifficulty === 'normal') {
                return Math.random() < 0.50 ? getBestMinimaxMove() : emptyIndexes[Math.floor(Math.random() * emptyIndexes.length)];
            } 
            else {
                return getBestMinimaxMove();
            }
        }

        function getBestMinimaxMove() {
            let bestScore = -Infinity;
            let move = -1;

            for (let i = 0; i < 9; i++) {
                if (board[i] === null) {
                    board[i] = BOT;
                    let score = minimax(board, 0, false, -Infinity, Infinity);
                    board[i] = null;

                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }
            return move;
        }

        function minimax(tempBoard, depth, isMaximizing, alpha, beta) {
            const result = checkGameState(tempBoard);
            if (result) {
                if (result.winner === BOT) return 10 - depth;
                if (result.winner === HUMAN) return depth - 10;
                if (result.winner === 'Tie') return 0;
            }

            if (isMaximizing) {
                let maxScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tempBoard[i] === null) {
                        tempBoard[i] = BOT;
                        let score = minimax(tempBoard, depth + 1, false, alpha, beta);
                        tempBoard[i] = null;
                        maxScore = Math.max(maxScore, score);
                        alpha = Math.max(alpha, score);
                        if (beta <= alpha) break;
                    }
                }
                return maxScore;
            } else {
                let minScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (tempBoard[i] === null) {
                        tempBoard[i] = HUMAN;
                        let score = minimax(tempBoard, depth + 1, true, alpha, beta);
                        tempBoard[i] = null;
                        minScore = Math.min(minScore, score);
                        beta = Math.min(beta, score);
                        if (beta <= alpha) break;
                    }
                }
                return minScore;
            }
        }

        function checkGameState(currentBoard) {
            for (let condition of WIN_CONDITIONS) {
                const [a, b, c] = condition;
                if (currentBoard[a] && currentBoard[a] === currentBoard[b] && currentBoard[a] === currentBoard[c]) {
                    return { winner: currentBoard[a], line: condition };
                }
            }
            return currentBoard.includes(null) ? null : { winner: 'Tie', line: null };
        }

        function processEndGame(result) {
            gameActive = false;
            isBotThinking = false;
            stopTimer();

            if (result.winner === 'Tie') {
                statusDisplay.textContent = "🤝 IT'S A DRAW";
                statusDisplay.className = "status-draw";
                return;
            }

            if (currentGameMode === 'bot') {
                if (result.winner === HUMAN) {
                    statusDisplay.textContent = "🏆 YOU WIN!";
                    statusDisplay.className = "status-player";
                    highlightWinningLine(result.line, '#00aaff');
                } else {
                    statusDisplay.textContent = "💀 U LOSE";
                    statusDisplay.className = "status-bot";
                    highlightWinningLine(result.line, '#ff2244');
                }
            } else {
                if (result.winner === HUMAN) {
                    statusDisplay.textContent = "🏆 BLUE WINS!";
                    statusDisplay.className = "status-player";
                    highlightWinningLine(result.line, '#00aaff');
                } else {
                    statusDisplay.textContent = "🏆 RED WINS!";
                    statusDisplay.className = "status-bot";
                    highlightWinningLine(result.line, '#ff2244');
                }
            }
        }

        function highlightWinningLine(line, color) {
            if (!line) return;
            line.forEach(index => {
                cells[index].classList.add('winning-cell');
                cells[index].style.color = color;
            });
        }

        function resetGame() {
            board = Array(9).fill(null);
            gameActive = true;
            isBotThinking = false;
            localTurn = 'O'; // Reset local turning variables state back to base
            timerContainer.style.opacity = "1";

            if (currentGameMode === 'bot') {
                statusDisplay.textContent = "Your Turn (O)";
                statusDisplay.className = "status-player";
            } else {
                statusDisplay.textContent = "Blue's Turn (O)";
                statusDisplay.className = "status-player";
            }

            cells.forEach(cell => {
                cell.innerHTML = '';
                cell.classList.remove('occupied', 'winning-cell');
                cell.style.color = '';
            });

            startTimer();
        }
    </script>
</body>
</html>
