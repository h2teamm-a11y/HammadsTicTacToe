    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Me (If You Can)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #f4f6f8;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  #btn {
    position: absolute;
    /* Perfectly centers a 160x50px button using CSS math */
    top: calc(50% - 25px);
    left: calc(50% - 80px);
    width: 160px;
    height: 50px;
    border: none;
    border-radius: 25px;
    background-color: #3498db;
    color: #ffffff;
    font-weight: bold;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    
    /* FIX: Added top and left transitions back so it visibly glides away with a fun bounce */
    transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                background-color 0.2s ease, 
                box-shadow 0.2s ease;
    user-select: none;
    padding: 0;
  }

  #btn.scared {
    background-color: #e74c3c; /* Red background */
    box-shadow: 0 4px 20px rgba(231, 76, 60, 0.4);
  }
</style>
</head>
<body>

<button id="btn">Click Me</button>

<script>
  const btn = document.getElementById('btn');

  function moveToRandomPosition() {
    const maxX = window.innerWidth - btn.offsetWidth;
    const maxY = window.innerHeight - btn.offsetHeight;

    const randomX = Math.max(0, Math.random() * maxX);
    const randomY = Math.max(0, Math.max(0, Math.random() * maxY));

    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
  }

  btn.addEventListener('mouseenter', () => {
    btn.textContent = 'No touchy';
    btn.classList.add('scared');
    moveToRandomPosition();
  });

  btn.addEventListener('mouseleave', () => {
    /* Added a small delay here so you actually get to see it fly away 
       while red and saying "No touchy" before it resets to blue! */
    setTimeout(() => {
      btn.textContent = 'Click Me';
      btn.classList.remove('scared');
    }, 300); 
  });

  btn.addEventListener('click', () => {
    btn.textContent = 'No Fair!';
    moveToRandomPosition();
  });
</script>

</body>
</html>
