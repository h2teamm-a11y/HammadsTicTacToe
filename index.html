<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Me (If You Can)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #f4f6f8;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  #btn {
    position: absolute;
    top: calc(50% - 25px);
    left: calc(50% - 80px);
    width: 160px;
    height: 50px;
    border: none;
    border-radius: 25px;
    background-color: #3498db; /* Starts Blue */
    color: #ffffff;
    font-weight: bold;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    transition: top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                background-color 0.2s ease, 
                box-shadow 0.2s ease;
    user-select: none;
    padding: 0;
  }

  #btn.scared {
    background-color: #e74c3c; /* Turns Red */
    box-shadow: 0 4px 20px rgba(231, 76, 60, 0.4);
  }
</style>
</head>
<body>

<button id="btn">Click Me</button>

<script>
  const btn = document.getElementById('btn');

  function moveToRandomPosition() {
    const maxX = window.innerWidth - btn.offsetWidth;
    const maxY = window.innerHeight - btn.offsetHeight;

    const randomX = Math.max(0, Math.random() * maxX);
    const randomY = Math.max(0, Math.random() * maxY);

    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
  }

  // This triggers the permanent change on the very first hover
  btn.addEventListener('mouseenter', () => {
    btn.textContent = 'No touchy';
    btn.classList.add('scared'); // Makes it red permanently
    moveToRandomPosition();
  });

  /* DELETED THE MOUSELEAVE FUNCTION HERE! 
    Because it's gone, the button will never change back to blue.
  */

  // If they somehow manage to click it, it still says "No Fair!" 
  // but it stays red because the 'scared' class is never removed.
  btn.addEventListener('click', () => {
    btn.textContent = 'No Fair!';
    moveToRandomPosition();
  });
</script>

</body>
</html>
